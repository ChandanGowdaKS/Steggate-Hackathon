version: "3.9"

services:
  steggate:
    build: .
    ports:
      - "${PORT:-5050}:5050"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads         # raw incoming images
      - ./sanitized:/app/sanitized     # clean output images
      - ./steggate.db:/app/steggate.db # SQLite database
      - ./calibration_web.json:/app/calibration_web.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3